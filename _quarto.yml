project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "tracks/*.qmd"
  resources:
    - robots.txt
    - slides/
    - .nojekyll

website:
  title: "AI Workshops for DSPH"
  description: "Hands-on AI workshops for Dornsife School of Public Health staff and faculty"
  navbar:
    background: "#003366"
    foreground: white
    left:
      - href: index.qmd
        text: Home
      - text: "Workshops"
        menu:
          - href: workshop1.qmd
            text: "1 · Foundations & Capabilities"
          - href: workshop2.qmd
            text: "2 · Workflow Enhancement"
          - href: workshop3.qmd
            text: "3 · Collaboration on Projects"
          - href: workshop4.qmd
            text: "4 · Documents & Visuals (Adobe)"
          - href: workshop5.qmd
            text: "5 · Getting Started with Agentic AI"
          - href: workshop6.qmd
            text: "6 · AI for Curriculum Development"
      - href: tracks.qmd
        text: "Self-Paced Tracks"
      - href: tools.qmd
        text: "Tools & Access"
      - href: resources.qmd
        text: Resources
    right:
      - icon: envelope
        href: mailto:daq26@drexel.edu
  page-footer:
    center: "AI Workshops for DSPH | Dornsife School of Public Health | Drexel University"
    background: "#003366"

format:
  html:
    theme:
      light: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    include-in-header:
      text: |
        <meta name="robots" content="noindex, nofollow">
